name: Backend Tests

on:
  push:
    branches: [ main, rest ]
  pull_request:
    branches: [ main, rest ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DJANGO_SPANISH_REVIEW_SECRET: 'test-secret-key-for-ci-do-not-use-in-production'

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      run: |
        cd backend
        python manage.py test vocab.tests -v 2
